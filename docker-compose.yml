services:
  postgres:
    image: postgres:16

    container_name: worklens-postgres

    restart: unless-stopped

    env_file: .env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: worklens

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d worklens"]
      interval: 5s
      timeout: 5s
      retries: 5  

volumes:
  postgres_data: